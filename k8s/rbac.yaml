apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-platform-api-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devops-platform-api-reader
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]
  - apiGroups: ["autoscaling/v2"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-platform-api-reader-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: devops-platform-api-sa
    namespace: default
roleRef:
  kind: Role
  name: devops-platform-api-reader
  apiGroup: rbac.authorization.k8s.io