name: Backend CI/CD - Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "docker/**"
      - "requirements.txt"
      - ".github/workflows/backend-containerapp.yml"

env:
  RESOURCE_GROUP: rg-devops-platform
  CONTAINER_APP_NAME: ca-devops-platform-api
  ACR_NAME: acrdevopsplatformjg
  ACR_LOGIN_SERVER: acrdevopsplatformjg.azurecr.io
  IMAGE_NAME: devops-platform-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} .
          docker tag $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Push image to ACR
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Update Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}